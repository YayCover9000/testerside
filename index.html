<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Obsidian</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.7.1/dist/jszip.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 250px;
      background: #2c3e50;
      color: white;
      padding: 15px;
      overflow-y: auto;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }
    #sidebar h2 {
      margin-top: 0;
      font-size: 1.3em;
      margin-bottom: 20px;
      border-bottom: 1px solid #34495e;
      padding-bottom: 10px;
    }
    #sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #sidebar li {
      margin-bottom: 5px;
    }
    #sidebar a {
      color: #ecf0f1;
      text-decoration: none;
      display: block;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    #sidebar a:hover {
      background: #34495e;
    }
    #sidebar a.active {
      background: #3498db;
    }
    #editor {
      flex: 1;
      padding: 20px;
      background: white;
      overflow-y: auto;
      position: relative;
    }
    #editor textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.6;
      padding: 0;
      margin: 0;
      background: transparent;
      color: #333;
    }
    #preview {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      overflow-y: auto;
    }
    #toolbar {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    button {
      padding: 8px 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #2980b9;
    }
    .file-input {
      display: none;
    }
  </style>
</head>
<body>
<div id="sidebar">
  <h2>📁 Dateien</h2>
  <ul id="file-list"></ul>
  <button id="new-file-btn">+ Neue Datei</button>
</div>

<div id="editor">
  <div id="toolbar">
    <button onclick="saveFile()">Speichern</button>
    <button onclick="downloadAll()">Herunterladen (ZIP)</button>
    <button onclick="openFile()">Datei öffnen</button>
    <input type="file" id="file-input" class="file-input" accept=".md">
  </div>
  <textarea id="editor-textarea" placeholder="Schreibe deine Notiz..."></textarea>
</div>

<script>
  const STORAGE_KEY = 'obsidian_files';
  let files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  let currentFile = null;

  function loadFiles() {
    const fileList = document.getElementById('file-list');
    fileList.innerHTML = '';

    const sortedFiles = Object.keys(files).sort();
    sortedFiles.forEach(filename => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = filename;
      a.onclick = () => openFileFromList(filename);
      li.appendChild(a);
      fileList.appendChild(li);
    });

    if (sortedFiles.length === 0) {
      fileList.innerHTML = '<li><em>Keine Dateien vorhanden</em></li>';
    }
  }

  function openFileFromList(filename) {
    currentFile = filename;
    document.getElementById('editor-textarea').value = files[filename];
    document.querySelectorAll('#file-list a').forEach(a => a.classList.remove('active'));
    document.querySelector(`#file-list a[href="#"][onclick="openFileFromList('${filename}')"]`).classList.add('active');
  }

  function saveFile() {
    if (!currentFile) {
      alert('Bitte erst eine Datei auswählen oder erstellen!');
      return;
    }
    files[currentFile] = document.getElementById('editor-textarea').value;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
    alert('Gespeichert!');
    loadFiles();
  }

  function newFile() {
    const filename = prompt('Gib einen Dateinamen ein (z. B. "notiz.md")');
    if (!filename) return;
    if (files[filename]) {
      alert('Datei existiert bereits!');
      return;
    }
    files[filename] = '# ' + filename.replace('.md', '');
    currentFile = filename;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
    loadFiles();
    document.getElementById('editor-textarea').value = files[filename];
  }

  function downloadAll() {
    const zip = new JSZip();
    Object.keys(files).forEach(filename => {
      zip.file(filename, files[filename]);
    });
    zip.generateAsync({ type: 'blob' }).then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'obsidian-backup.zip';
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  function openFile() {
    document.getElementById('file-input').click();
  }

  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const content = e.target.result;
      const filename = file.name;
      files[filename] = content;
      currentFile = filename;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
      loadFiles();
      document.getElementById('editor-textarea').value = content;
    };
    reader.readAsText(file);
  });

  document.getElementById('new-file-btn').addEventListener('click', newFile);

  window.onload = function() {
    loadFiles();
    const textarea = document.getElementById('editor-textarea');
    textarea.addEventListener('input', function() {
      if (currentFile) {
        files[currentFile] = textarea.value;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
      }
    });
  };
</script>
</body>
</html>
